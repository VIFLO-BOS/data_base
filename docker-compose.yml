version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: annotator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: annotator
      POSTGRES_PASSWORD: annotator_dev
      POSTGRES_DB: annotator_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/database/init:/docker-entrypoint-initdb.d
    networks:
      - annotator-network

  redis:
    image: redis:7-alpine
    container_name: annotator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - annotator-network

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: annotator-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://annotator:annotator_dev@postgres:5432/annotator_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - annotator-network
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    container_name: annotator-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - annotator-network
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  annotator-network:
    driver: bridge
